name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK platform 35 + build-tools
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mario-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release AAB (signed)
        if: "${{ secrets.KEYSTORE_BASE64 != '' }}"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android.keystore
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/android.keystore \
            -Pandroid.injected.signing.store.password=$KEY_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload release AAB
        if: "${{ secrets.KEYSTORE_BASE64 != '' }}"
        uses: actions/upload-artifact@v4
        with:
          name: mario-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
